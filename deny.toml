# cargo-deny configuration
# Docs: https://embarkstudios.github.io/cargo-deny/

[graph]
targets = [
  { triple = "aarch64-unknown-linux-musl" },
  { triple = "x86_64-unknown-linux-musl" },
]

# ── Advisories ────────────────────────────────────────────────────────────────
# Block any dependency with a known security advisory
[advisories]
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"

# ── Licenses ──────────────────────────────────────────────────────────────────
# Only allow permissive licenses — no GPL/LGPL in Lambda binary
[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-DFS-2016",
  "Unicode-3.0",
  "CC0-1.0",
  "OpenSSL",
]
deny = [
  "GPL-2.0",
  "GPL-3.0",
  "LGPL-2.0",
  "LGPL-2.1",
  "LGPL-3.0",
  "AGPL-3.0",
]
copyleft = "deny"
allow-osi-fsf-free = "neither"
default = "deny"
confidence-threshold = 0.8

# ── Bans ──────────────────────────────────────────────────────────────────────
# Prevent known-problematic or duplicate crates
[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

deny = [
  { name = "openssl" },
  { name = "openssl-sys" },
  { name = "native-tls" },
]

# ── Sources ───────────────────────────────────────────────────────────────────
# Only allow crates from crates.io (no git deps in production)
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
