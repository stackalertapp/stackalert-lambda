name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy
          targets: aarch64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Validate
        run: |
          cargo clippy --all-targets --all-features -- -D warnings
          cargo test --all-features

      - name: Install cargo-zigbuild
        run: |
          pip3 install ziglang
          cargo install cargo-zigbuild

      - name: Build release binary (arm64, glibc 2.34 — Lambda AL2023)
        run: cargo zigbuild --release --target aarch64-unknown-linux-gnu.2.34

      - name: Package Lambda artifact
        run: |
          mkdir -p dist
          cp target/aarch64-unknown-linux-gnu/release/bootstrap dist/bootstrap
          cd dist && zip lambda-arm64.zip bootstrap
          echo "Artifact size: $(du -sh lambda-arm64.zip)"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          generate_release_notes: true
          files: dist/lambda-arm64.zip
