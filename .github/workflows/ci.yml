name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: cargo test
        run: cargo test --all-features

  deny:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  trivy:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.30.0
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "CRITICAL,HIGH"
          exit-code: "1"

  build:
    name: Build Lambda
    runs-on: ubuntu-latest
    needs: [check, deny, trivy]
    outputs:
      artifact-sha: ${{ steps.sha.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl

      - uses: Swatinem/rust-cache@v2

      - name: Install cross-compilation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release binary (arm64 musl)
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target aarch64-unknown-linux-musl

      - name: Package Lambda artifact
        run: |
          mkdir -p dist
          cp target/aarch64-unknown-linux-musl/release/bootstrap dist/bootstrap
          cd dist && zip lambda.zip bootstrap
          echo "Artifact size: $(du -sh lambda.zip)"

      - name: Compute artifact SHA
        id: sha
        run: echo "sha=$(sha256sum dist/lambda.zip | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Upload artifact (GitHub Actions)
        uses: actions/upload-artifact@v4
        with:
          name: lambda-arm64
          path: dist/lambda.zip
          retention-days: 30

  publish:
    name: Publish to S3
    runs-on: ubuntu-latest
    needs: build
    # Only publish on push to main (not PRs)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write  # Required for OIDC
      contents: read
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: lambda-arm64
          path: dist

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PUBLISH_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'eu-central-1' }}

      - name: Upload to S3 (versioned + latest)
        env:
          BUCKET: ${{ vars.ARTIFACT_S3_BUCKET }}
        run: |
          SHA="${{ needs.build.outputs.artifact-sha }}"
          SHORT_SHA="${GITHUB_SHA:0:8}"

          # Upload versioned artifact (immutable)
          aws s3 cp dist/lambda.zip \
            "s3://${BUCKET}/stackalert-lambda/${SHORT_SHA}.zip" \
            --metadata "git-sha=${GITHUB_SHA},built-by=github-actions"

          # Update 'latest' pointer
          aws s3 cp dist/lambda.zip \
            "s3://${BUCKET}/stackalert-lambda/latest.zip" \
            --metadata "git-sha=${GITHUB_SHA},built-by=github-actions"

          echo "✅ Published:"
          echo "  s3://${BUCKET}/stackalert-lambda/${SHORT_SHA}.zip"
          echo "  s3://${BUCKET}/stackalert-lambda/latest.zip"
          echo "  SHA256: ${SHA}"
